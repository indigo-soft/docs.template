# Dependabot configuration
# Handles GitHub Actions version updates only.
# npm/Node.js dependencies are managed by Renovate (renovate.json).
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
    - package-ecosystem: 'github-actions'
      directory: '/'
      schedule:
          interval: 'weekly'
          day: 'monday'
          time: '09:00'
          timezone: 'Europe/Kyiv'
      labels:
          - 'dependencies'
          - 'github-actions'
      commit-message:
          prefix: 'chore(ci)'
      groups:
          github-actions:
              patterns:
                  - '*'
