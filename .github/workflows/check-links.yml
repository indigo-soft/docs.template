name: Check Links
permissions:
    contents: read
    pull-requests: write

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    schedule:
        # Run weekly on Monday at 09:00 UTC to catch externally broken links
        - cron: '0 9 * * 1'

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    check-links:
        name: Check markdown links
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            # On push and pull_request: fast offline check of internal links only
            - name: Check internal links (push / PR)
              if: github.event_name != 'schedule'
              uses: lycheeverse/lychee-action@v2
              with:
                  args: >
                      --offline
                      --include-fragments
                      --exclude-path "node_modules/**"
                      "**/*.md"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            # On weekly schedule: full check including external links
            - name: Check all links incl. external (schedule)
              if: github.event_name == 'schedule'
              uses: lycheeverse/lychee-action@v2
              with:
                  args: >
                      --include-fragments
                      --exclude-path "node_modules/**"
                      --max-retries 3
                      "**/*.md"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
