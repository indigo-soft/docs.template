name: Renovate

on:
    # Nightly run — Renovate checks for updates and opens PRs based on renovate.json schedule
    schedule:
        -   cron: '0 2 * * *'
    # Allow manual trigger (e.g., to force an immediate check)
    workflow_dispatch: { }

permissions:
    contents: read

concurrency:
    group: renovate
    cancel-in-progress: false

jobs:
    renovate:
        name: Renovate Dependency Check
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Run Renovate
                uses: renovatebot/github-action@v46.1.14
                with:
                    # Requires a GitHub PAT (classic) with repo scope stored as RENOVATE_TOKEN secret.
                    # See docs/guides/dependency-updates.md for setup instructions.
                    token: ${{ secrets.RENOVATE_TOKEN }}
                env:
                    # Enable debug logging for troubleshooting (set to "info" in production)
                    LOG_LEVEL: info
