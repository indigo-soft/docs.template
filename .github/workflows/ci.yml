name: CI
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
jobs:
    lint-and-typecheck:
        name: Lint & Type Check
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout code
                uses: actions/checkout@v6
            -   name: Set up Node.js
                uses: actions/setup-node@v6
                with:
                    node-version: '24'
            -   name: Set up pnpm
                uses: pnpm/action-setup@v6
                with:
                    version: '10'
                    run_install: false
            -   name: Get pnpm store directory
                id: pnpm-cache
                shell: bash
                run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
            -   name: Cache pnpm modules
                uses: actions/cache@v5
                with:
                    path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
                    key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
                    restore-keys: |
                        ${{ runner.os }}-pnpm-
            -   name: Install dependencies
                run: pnpm install --frozen-lockfile
            -   name: Lint
                run: pnpm lint
            -   name: Type check
                run: pnpm type-check
    test:
        name: Tests
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout code
                uses: actions/checkout@v6
            -   name: Set up Node.js
                uses: actions/setup-node@v6
                with:
                    node-version: '24'
            -   name: Set up pnpm
                uses: pnpm/action-setup@v6
                with:
                    version: '10'
                    run_install: false
            -   name: Get pnpm store directory
                id: pnpm-cache
                shell: bash
                run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
            -   name: Cache pnpm modules
                uses: actions/cache@v5
                with:
                    path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
                    key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
                    restore-keys: |
                        ${{ runner.os }}-pnpm-
            -   name: Install dependencies
                run: pnpm install --frozen-lockfile
            -   name: Run tests
                run: pnpm test
    format-check:
        name: Format Check
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout code
                uses: actions/checkout@v6
            -   name: Set up Node.js
                uses: actions/setup-node@v6
                with:
                    node-version: '24'
            -   name: Set up pnpm
                uses: pnpm/action-setup@v6
                with:
                    version: '10'
                    run_install: false
            -   name: Install dependencies
                run: pnpm install --frozen-lockfile
            -   name: Check formatting
                run: pnpm format:check
