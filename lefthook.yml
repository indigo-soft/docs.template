# Lefthook Configuration
# Docs: https://github.com/evilmartians/lefthook

colors: true

# Pre-commit — format and lint staged files
pre-commit:
    parallel: false
    commands:
        format:
            glob: '**/*.{md,json,yml,yaml,ts,js,mjs}'
            run: prettier --write {staged_files}
            stage_fixed: true
            fail_text: '❌ FORMATTING — Prettier found issues. Run: pnpm format'

        lint:
            glob: '**/*.md'
            run: markdownlint-cli2 {staged_files}
            fail_text: '❌ LINT — markdownlint found issues. Run: pnpm lint:fix'

# Commit-msg — validate commit message format
commit-msg:
    parallel: false
    commands:
        commitlint:
            # On failure, .lefthook/commit-format-info.sh prints the full format reference
            run: commitlint --edit {1} --verbose || { bash .lefthook/commit-format-info.sh; exit 1; }
            fail_text: '❌ COMMIT REJECTED — invalid commit message format. See format reference above and docs/guides/git-workflow.md'

# Pre-push — lint and format check
pre-push:
    parallel: false
    commands:
        lint:
            run: pnpm run lint:check
            fail_text: '❌ LINT — markdownlint found issues. Run: pnpm lint:fix'

        format:
            run: pnpm run format:check
            fail_text: '❌ FORMATTING — Prettier found issues. Run: pnpm format:fix'
