# Lefthook Configuration
# Docs: https://github.com/evilmartians/lefthook

colors: true

# Pre-commit — format and lint only staged files
pre-commit:
    parallel: false
    commands:
        format:
            glob: "src/**/*.{ts,tsx,js,jsx,json,md,prisma,css,scss}"
            run: node node_modules/@commitlint/cli/cli.js --edit {1} --verbose
            stage_fixed: true
            fail_text: "❌ FORMATTING — Prettier found issues. Run: node node_modules/prettier/bin/prettier.cjs --write ."

        lint:
            glob: "src/**/*.{ts,tsx,js,jsx}"
            run: node node_modules/eslint/bin/eslint.js --fix {staged_files}
            stage_fixed: true
            fail_text: "❌ LINT — ESLint found issues. Run: node node_modules/eslint/bin/eslint.js --fix src/"

# Commit-msg — validate commit message format
commit-msg:
    parallel: false
    commands:
        commitlint:
            run: commitlint --edit {1} --verbose
            fail_text: "❌ COMMIT REJECTED — invalid commit message format.\n   Format: <type>(<scope>): <description>\n   Example: feat(auth): add JWT token refresh\n   See: docs/guides/git-workflow.md"

# Pre-push — no tests in this repo
pre-push:
    parallel: false
    commands:
        typecheck:
            run: echo "No typecheck configured yet"
